services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: absensi_operator_app
    ports:
      - "8000:8000"
      - "5173:5173"
    volumes:
      - .:/var/www/html
      - app-vendor:/var/www/html/vendor
      - app-node_modules:/var/www/html/node_modules
    networks:
      - laravel-network
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: absensi_operator_db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: absensi_operator
      MYSQL_USER: sail
      MYSQL_PASSWORD: password
    volumes:
      - sail-mysql:/var/lib/mysql
    networks:
      - laravel-network

networks:
  laravel-network:
    driver: bridge

volumes:
  sail-mysql:
    driver: local
  app-vendor:
    driver: local
  app-node_modules:
    driver: local
